<!-- ═══════════════════════════════════════════════════════════════════════
     breadcrumbs-config  –  Configuration node (API Token)
     ═══════════════════════════════════════════════════════════════════════ -->

<script type="text/javascript">
    RED.nodes.registerType('breadcrumbs-config', {
        category:  'config',
        defaults: {
            name:     { value: '' },
            hostname: { value: '' }
        },
        credentials: {
            token: { type: 'password' }
        },
        label: function () {
            return this.name || 'Breadcrumbs API';
        }
    });
</script>

<script type="text/html" data-template-name="breadcrumbs-config">
    <div class="form-row">
        <label for="node-config-input-name">
            <i class="fa fa-tag"></i> Name
        </label>
        <input type="text" id="node-config-input-name" placeholder="Breadcrumbs API">
    </div>
    <div class="form-row">
        <label for="node-config-input-token">
            <i class="fa fa-key"></i> API Token
        </label>
        <input type="password" id="node-config-input-token" placeholder="Bearer token">
    </div>
    <div class="form-row">
        <label for="node-config-input-hostname">
            <i class="fa fa-server"></i> Hostname
        </label>
        <input type="text" id="node-config-input-hostname" placeholder="e.g. my-server (optional)">
    </div>
</script>


<!-- ═══════════════════════════════════════════════════════════════════════
     breadcrumbs-log  –  Main logging node
     ═══════════════════════════════════════════════════════════════════════ -->

<script type="text/javascript">
    RED.nodes.registerType('breadcrumbs-log', {
        category:  'output',
        color:     '#8dbbe6',
        defaults: {
            name:     { value: '' },
            server:   { value: '', type: 'breadcrumbs-config', required: true },
            severity: { value: 'info' }
        },
        inputs:  1,
        outputs: 1,
        icon:    'font-awesome/fa-map-marker',
        label: function () {
            return this.name || 'breadcrumbs';
        },
        paletteLabel: 'breadcrumbs',
        labelStyle: function () {
            return this.name ? 'node_label_italic' : '';
        }
    });
</script>

<script type="text/html" data-template-name="breadcrumbs-log">
    <div class="form-row">
        <label for="node-input-name">
            <i class="fa fa-tag"></i> Name
        </label>
        <input type="text" id="node-input-name" placeholder="(optional)">
    </div>

    <div class="form-row">
        <label for="node-input-server">
            <i class="fa fa-plug"></i> Config
        </label>
        <input type="text" id="node-input-server">
    </div>

    <div class="form-row">
        <label for="node-input-severity">
            <i class="fa fa-exclamation-circle"></i> Severity
        </label>
        <select id="node-input-severity" style="width:70%">
            <option value="debug">debug</option>
            <option value="info">info</option>
            <option value="notice">notice</option>
            <option value="warning">warning</option>
            <option value="error">error</option>
            <option value="critical">critical</option>
            <option value="alert">alert</option>
            <option value="emergency">emergency</option>
        </select>
    </div>

    <div class="form-tips">
        <b>Tip:</b> Override at runtime via <code>msg.severity</code>, <code>msg.source</code>,
        <code>msg.hostname</code>, or <code>msg.metadata</code> (object).
        <code>msg.payload</code> is used as the log message.
    </div>
</script>

<script type="text/html" data-help-name="breadcrumbs-log">
    <p>Sends a log entry to the <a href="https://breadcrumbs.rutta.net" target="_blank">Breadcrumbs API</a>.</p>

    <h3>Inputs</h3>
    <dl class="message-properties">
        <dt>payload <span class="property-type">string | object</span></dt>
        <dd>The log message. Objects are serialised to JSON automatically.</dd>

        <dt class="optional">severity <span class="property-type">string</span></dt>
        <dd>Overrides the severity configured in the node editor.
            Allowed values: <code>debug</code>, <code>info</code>, <code>notice</code>,
            <code>warning</code>, <code>error</code>, <code>critical</code>,
            <code>alert</code>, <code>emergency</code>.</dd>

        <dt class="optional">source <span class="property-type">string</span></dt>
        <dd>Service or component identifier sent to the API.</dd>

        <dt class="optional">hostname <span class="property-type">string</span></dt>
        <dd>Sending server hostname. Falls back to the hostname configured in the
            Breadcrumbs Config node.</dd>

        <dt class="optional">metadata <span class="property-type">object</span></dt>
        <dd>Arbitrary JSON object with additional data attached to the log entry.
            If <code>msg.topic</code> is set it is merged into metadata automatically.</dd>

        <dt class="optional">topic <span class="property-type">string</span></dt>
        <dd>Forwarded as <code>metadata.topic</code> for backward compatibility.</dd>
    </dl>

    <h3>Outputs</h3>
    <dl class="message-properties">
        <dt>payload <span class="property-type">string | object</span></dt>
        <dd>The original payload is passed through unchanged on success.</dd>
    </dl>

    <h3>Details</h3>
    <p>
        The node requires a <b>Breadcrumbs Config</b> node that holds your API token
        and an optional default hostname. The token is stored encrypted by Node-RED.
    </p>
    <p>
        The node status shows <b>sending…</b> while the request is in flight,
        <b>success</b> (green) on 2xx, or <b>error &lt;code&gt;</b> (red) on failure.
        HTTP 429 means the rate limit (600 req/min) was exceeded.
    </p>
</script>
